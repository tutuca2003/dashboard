{% extends "admin/change_form.html" %}

{% block extrahead %}
    {{ block.super }}
    <style>
        #loader-overlay-admin {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8); z-index: 9999;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner-admin {
            width: 50px; height: 50px;
            border: 5px solid #f3f3f3; border-top: 5px solid #0d6efd;
            border-radius: 50%; animation: spin-admin 1s linear infinite;
        }
        @keyframes spin-admin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
{% endblock %}

{% block content %}
    <div id="loader-overlay-admin">
        <div class="spinner-admin"></div>
        <div style="margin-top: 15px; font-weight: bold; color: #0d6efd; font-family: sans-serif;">
            Sincronizando con Google Sheets...
        </div>
    </div>
    {{ block.super }}
{% endblock %}

{% block footer %}
    {{ block.super }}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // El formulario del admin de Django suele tener el ID del modelo
            const form = document.getElementById('stock_form') || document.querySelector('form');
            if (form) {
                form.addEventListener('submit', function() {
                    document.getElementById('loader-overlay-admin').style.display = 'flex';
                });
            }
        });
    </script>
{% endblock %}
